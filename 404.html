<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>软件分享</title>
  <script>
    // 将原始路径保存到 sessionStorage，然后重定向到首页
    sessionStorage.setItem('redirectPath', window.location.pathname + window.location.search + window.location.hash);
    window.location.href = '/ldrj.github.io/';
  </script>
</head>
<body>
  <p>页面加载中...</p>
</body>
</html>
